name: Deploy to Go54 cPanel via FTP

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        # Using npm install to ensure fresh dependencies are fetched
        run: npm install

      - name: Build Project
        # This will create the 'dist' folder for Vite
        run: npm run build

      - name: Sync files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./public_html/
          timeout: 300000
          # Optional: delete files on server that don't exist locally
          # dangerous-clean-slate: true
